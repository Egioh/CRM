{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">Редактирование заказа</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">Услуга *</label>
                        <input type="text" name="service" class="form-control" 
                               value="{{ order.service }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Цена *</label>
                        <input type="number" step="0.01" name="price" class="form-control" 
                               value="{{ order.price }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Дата и время</label>
                        <input type="datetime-local" name="date" class="form-control" 
                               value="{{ order.date.strftime('%Y-%m-%dT%H:%M') }}">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Примечания</label>
                        <textarea name="notes" class="form-control" rows="3">{{ order.notes }}</textarea>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">Сохранить</button>
                        <a href="{{ url_for('client_detail', client_id=order.client_id) }}" 
                           class="btn btn-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
