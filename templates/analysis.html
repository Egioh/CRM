{% extends "base.html" %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2>AI Анализ клиента: {{ client.name }}</h2>
        
        <div class="card mt-4">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">🤖 Рекомендации DeepSeek</h5>
            </div>
            <div class="card-body">
                <div style="white-space: pre-line;">{{ analysis }}</div>
            </div>
        </div>

        <div class="mt-3">
            <a href="{{ url_for('client_detail', client_id=client.id) }}" class="btn btn-secondary">
                ← Назад к клиенту
            </a>
            <a href="{{ url_for('index') }}" class="btn btn-primary">
                📋 К списку клиентов
            </a>
        </div>
    </div>
</div>
{% endblock %}
