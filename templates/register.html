{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">{{ _('Регистрация бизнеса') }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">{{ _('Email') }}</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ _('Пароль') }}</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ _('Название бизнеса') }}</label>
                        <input type="text" name="business_name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ _('Тип бизнеса') }}</label>
                        <select name="business_type" class="form-control" required>
                            <option value="">{{ _('Выберите тип бизнеса') }}</option>
                            <option value="Маникюрный салон">{{ _('Маникюрный салон') }}</option>
                            <option value="Ремонт телефонов">{{ _('Ремонт телефонов') }}</option>
                            <option value="Автосервис">{{ _('Автосервис') }}</option>
                            <option value="Парикмахерская">{{ _('Парикмахерская') }}</option>
                            <option value="Другое">{{ _('Другое') }}</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ _('Описание бизнеса') }}</label>
                        <textarea name="business_description" class="form-control" rows="3" 
                                  placeholder="{{ _('Опишите основные услуги, специфику работы...') }}"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">{{ _('Зарегистрироваться') }}</button>
                </form>
                <div class="text-center mt-3">
                    <a href="{{ url_for('login') }}">{{ _('Уже есть аккаунт? Войдите') }}</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
