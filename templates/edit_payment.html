{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">{{ _('Редактирование платежа') }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">{{ _('Сумма *') }}</label>
                        <input type="number" step="0.01" name="amount" class="form-control" 
                               value="{{ payment.amount }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">{{ _('Способ оплаты *') }}</label>
                        <select name="method" class="form-control" required>
                            <option value="cash" {% if payment.method == 'cash' %}selected{% endif %}>{{ _('Наличные') }}</option>
                            <option value="card" {% if payment.method == 'card' %}selected{% endif %}>{{ _('Карта') }}</option>
                            <option value="transfer" {% if payment.method == 'transfer' %}selected{% endif %}>{{ _('Перевод') }}</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">{{ _('Дата и время') }}</label>
                        <input type="datetime-local" name="date" class="form-control" lang="{{ html_lang }}"
                               value="{{ payment.date.strftime('%Y-%m-%dT%H:%M') }}">
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">{{ _('Примечания') }}</label>
                        <textarea name="notes" class="form-control" rows="3">{{ payment.notes }}</textarea>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">{{ _('Сохранить') }}</button>
                        <a href="{{ url_for('client_detail', client_id=payment.client_id) }}" 
                           class="btn btn-secondary">{{ _('Отмена') }}</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
